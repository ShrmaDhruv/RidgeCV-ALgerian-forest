<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction Result</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <div class="main-wrapper">

    <div class="card result-card">

      <h1>🔥 Prediction Result</h1>

      {% if results is not none %}

        <div class="result-display 
            {% if results == 1 %}high-risk{% else %}low-risk{% endif %}">

          {% if results == 1 %}
            <h2>🔥 High Fire Risk</h2>
            <p>Conditions are highly favorable for forest fire.</p>
          {% else %}
            <h2>🌿 Low Fire Risk</h2>
            <p>Conditions are relatively safe.</p>
          {% endif %}

        </div>

      {% else %}
        <p class="no-result">No prediction available yet.</p>
      {% endif %}

      <a href="/" class="back-btn">← Back to Prediction</a>

    </div>

  </div>

</body>
</html>

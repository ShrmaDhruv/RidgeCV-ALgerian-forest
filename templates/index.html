<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forest Fire Prediction</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <script>
    function showLoading() {
      document.getElementById("loading").style.display = "flex";
    }

    function updateValue(slider, outputId) {
      document.getElementById(outputId).innerText = slider.value;
    }
  </script>
</head>

<body>

  <div class="main-wrapper">
    
    <div class="card">
      <h1>Forest Fire Prediction</h1>
      <p class="subtitle">Adjust parameters to predict fire risk</p>

      <form action="/predictdata" method="POST" class="form-grid" onsubmit="showLoading()">

        <!-- Temperature -->
        <div class="input-group full-width">
          <label>Temperature (°C): <span id="tempValue">25</span></label>
          <input type="range" name="Temperature" min="0" max="50" step="0.1" value="25"
                 oninput="updateValue(this, 'tempValue')">
        </div>

        <!-- Humidity -->
        <div class="input-group full-width">
          <label>Relative Humidity (%): <span id="rhValue">50</span></label>
          <input type="range" name="RH" min="0" max="100" step="1" value="50"
                 oninput="updateValue(this, 'rhValue')">
        </div>

        <!-- Wind Speed -->
        <div class="input-group full-width">
          <label>Wind Speed: <span id="wsValue">10</span></label>
          <input type="range" name="Ws" min="0" max="100" step="1" value="10"
                 oninput="updateValue(this, 'wsValue')">
        </div>

        <!-- Rain -->
        <div class="input-group full-width">
          <label>Rain (mm): <span id="rainValue">0</span></label>
          <input type="range" name="Rain" min="0" max="50" step="0.1" value="0"
                 oninput="updateValue(this, 'rainValue')">
        </div>

        <!-- FFMC -->
        <div class="input-group full-width">
          <label>FFMC Index: <span id="ffmcValue">85</span></label>
          <input type="range" name="FFMC" min="0" max="100" step="0.1" value="85"
                 oninput="updateValue(this, 'ffmcValue')">
        </div>

        <!-- DMC -->
        <div class="input-group full-width">
          <label>DMC Index: <span id="dmcValue">100</span></label>
          <input type="range" name="DMC" min="0" max="300" step="1" value="100"
                 oninput="updateValue(this, 'dmcValue')">
        </div>

        <!-- ISI -->
        <div class="input-group full-width">
          <label>ISI Index: <span id="isiValue">10</span></label>
          <input type="range" name="ISI" min="0" max="50" step="0.1" value="10"
                 oninput="updateValue(this, 'isiValue')">
        </div>

        <!-- Fire Class -->
        <div class="input-group">
          <label>Fire Class</label>
          <select name="Classes" required>
            <option value="0">Low Risk</option>
            <option value="1">High Risk</option>
          </select>
        </div>

        <!-- Region -->
        <div class="input-group">
          <label>Region</label>
          <select name="Region" required>
            <option value="0">Bejaia</option>
            <option value="1">Sidi-Bel Abbes</option>
          </select>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn">Predict Fire Risk</button>

      </form>
    </div>

  </div>

  <!-- Loading Overlay -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>Analyzing data...</p>
  </div>

</body>
</html>
